name: Trigger Kaggle training run

on:
  push:
    branches: [main]
    paths:
      - "scripts/train_lora.py"
      - "configs/lora_config_kaggle.yaml"
      - "notebooks/train_lora.ipynb"
      - "src/**"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Write Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${{ secrets.KAGGLE_USERNAME }}\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Push kernel and trigger run
        run: kaggle kernels push -p .

      - name: Print kernel URL
        run: |
          echo "Kernel pushed. Monitor at:"
          echo "https://www.kaggle.com/code/${{ secrets.KAGGLE_USERNAME }}/commit-model-training"
