name: Push training data to Kaggle

on:
  push:
    branches: [main]
    paths:
      - "data/processed/**"

jobs:
  push-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Write Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${{ secrets.KAGGLE_USERNAME }}\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Create or update Kaggle dataset
        run: |
          # Try to create the dataset first; if it already exists, push a new version
          kaggle datasets create -p data/processed/ --dir-mode zip 2>/dev/null || \
          kaggle datasets version -p data/processed/ -m "Auto-update from ${{ github.sha }}"
